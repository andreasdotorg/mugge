# Bose PS28 III — individual 5.25" driver unit
#
# This file represents a SINGLE driver, not the isobaric pair. The isobaric
# clamshell configuration (two drivers) is an identity-layer concern — see
# configs/speakers/identities/bose-ps28-iii-sub.yml.
#
# Data sourced from:
#   - configs/speakers/identities/bose-ps28-iii-sub.yml (operational parameters)
#   - docs/lab-notes/bose-ps28-iii-port-tuning.md (near-field measurements, 2026-03-11)
#
# This is a PASSIVE CONVERSION of the PS28 III powered module.
# Ported enclosure with folded dual-vent labyrinth (Bose waveguide design).
#
# Bose does not publish T/S parameters for proprietary drivers. Most T/S
# fields are null — this is a placeholder awaiting jig measurements.
# The identity file carries the operationally important data (impedance,
# power handling, HPF, port tuning).

