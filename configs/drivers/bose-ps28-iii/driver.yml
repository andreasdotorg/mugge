application_notes:
  - note: >
      Isobaric clamshell configuration halves the effective Vas, allowing
      a smaller enclosure for the same low-frequency extension. Trade-off
      is 3dB lower sensitivity vs a single driver.
    source: "Bose engineering documentation"
    confidence: high
  - note: >
      Staggered dual-port design (58Hz + 88Hz) broadens port bandwidth
      vs single-tuned port. Dual-port resonance structure will be
      addressed by room correction FIR after listening-position measurement.
    source: "Near-field measurement 2026-03-11"
    confidence: high
  - note: >
      Subsonic HPF at 42Hz is MANDATORY. Cone excursion rises sharply
      below port tuning and will exceed Xmax without protection.
      42Hz = 0.72x upper port tuning (58Hz), within standard safety margin.
    source: "D-031, lab measurement validation"
    confidence: high
