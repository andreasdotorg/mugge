# Bose Panaray System 28 III — isobaric subwoofer module
# Passive conversion of the PS28 III. Two 5.25" drivers in isobaric
# (clamshell) configuration. Ported enclosure with folded dual-vent
# labyrinth (Bose waveguide design). Very low impedance — amp must
# handle 2.33 ohm.
#
# Staggered dual-port design: upper port tuned ~58Hz, lower port ~88Hz.
# Combined port bandwidth approximately 45-100Hz. Measured via near-field
# UMIK-1 at 1-2cm per vent, 2026-03-11.
#
# The enclosure has a strong resonance peak around 65Hz that needs
# compensation EQ baked into the FIR filter.
#
# Subsonic HPF at 42Hz is MANDATORY — cone excursion rises sharply
# below port tuning and will exceed Xmax without protection.

name: "Bose PS28 III Subwoofer"
manufacturer: "Bose"
model: "Panaray System 28 III"
type: ported
enclosure_note: "Folded dual-vent labyrinth (Bose waveguide design)"
port_tuning_hz:
  upper_port: 58
  lower_port: 88
port_tuning_note: >
  Measured via near-field UMIK-1 at 1-2cm per vent, 2026-03-11.
  Staggered dual-port design: upper port ~58Hz, lower port ~88Hz.
  Combined port bandwidth approximately 45-100Hz.

impedance_ohm: 2.33
sensitivity_db_spl: null

# D-029 gain staging
max_boost_db: 10
mandatory_hpf_hz: 42  # 0.72x upper port tuning (58Hz measured). Standard safety margin.

# Power handling
max_power_watts: 62
power_limit_note: >
  62W thermal limit for isobaric pair. Amp delivers up to 450W into 4 ohm
  (more into 2.33 ohm). Power limiting is CRITICAL.

# Compensation EQ — port/enclosure resonance peak
compensation_eq:
  - type: peak
    frequency_hz: 65
    gain_db: 10.0
    q: 1.0
    description: "Port/enclosure resonance peak (+10dB at 65Hz)"
